# Full stack local deployment:
#   1. encore run --listen :12345          (backend + databases)
#   2. docker compose -f docker-compose.dev.yml up -d  (nginx + freeswitch)
#
# Access:
#   Admin Dashboard: http://localhost:8080
#   Client Portal:   http://localhost:8081
#   Encore Dashboard: http://localhost:9400
#
# HA mode: docker compose -f docker-compose.dev.yml --profile ha up -d

services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: bos3000-nginx
    ports:
      - "8080:8080"
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bos3000

  freeswitch-primary:
    image: safarov/freeswitch:latest
    container_name: bos3000-fs-primary
    ports:
      - "8021:8021"
      - "5080:5080/udp"
      - "5080:5080/tcp"
    volumes:
      - ./docker/freeswitch/conf:/usr/local/freeswitch/etc/freeswitch
      - fs-recordings:/var/lib/freeswitch/recordings
    environment:
      - ESL_PASSWORD=ClueCon
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8021"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - bos3000

  freeswitch-standby:
    image: safarov/freeswitch:latest
    container_name: bos3000-fs-standby
    ports:
      - "8022:8021"
      - "5081:5080/udp"
    volumes:
      - ./docker/freeswitch/conf:/usr/local/freeswitch/etc/freeswitch
      - fs-recordings:/var/lib/freeswitch/recordings
    environment:
      - ESL_PASSWORD=ClueCon
    profiles:
      - ha
    networks:
      - bos3000

volumes:
  fs-recordings:

networks:
  bos3000:
